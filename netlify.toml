# Netlify configuration for the Alpha Vault landing page.
#
# Next.js is auto-detected on Netlify and its runtime (adapter) is installed
# automatically — you normally don't need to configure anything. This file just
# makes the build explicit and pins the Node version so local and CI builds
# match. Per Netlify's guidance we do NOT pin the adapter version; Netlify keeps
# it up to date on each build.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Redirect the default Netlify subdomain to the custom domain. Netlify keeps
# the *.netlify.app subdomain live permanently as a fallback even after a
# custom domain is attached — there's no dashboard toggle to change that, so
# this is done as an explicit redirect rule instead. Only matches requests
# whose Host header is the old subdomain, so it has no effect once visitors
# are already on alphavaultx.com.
[[redirects]]
  from = "https://alphavaultx.netlify.app/*"
  to = "https://alphavaultx.com/:splat"
  status = 301
  force = true
